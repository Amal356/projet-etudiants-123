services:
  postgres:
    image: postgres:15-alpine
    container_name: studentdb-postgres
    environment:
      POSTGRES_DB: studentdb
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: student_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - student-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_user -d studentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studentdb-redis
    ports:
      - "6380:6379"
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: studentdb-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  etudiant-service:
    build:
      context: ./spring-boot-api
      dockerfile: Dockerfile
    container_name: etudiant-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studentdb
      SPRING_DATASOURCE_USERNAME: student_user
      SPRING_DATASOURCE_PASSWORD: student_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - student-network

  grading-service:
    build:
      context: ./grading-service
      dockerfile: Dockerfile
    container_name: grading-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studentdb
      SPRING_DATASOURCE_USERNAME: student_user
      SPRING_DATASOURCE_PASSWORD: student_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - student-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8888:8888"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      etudiant-service:
        condition: service_started
      grading-service:
        condition: service_started
    networks:
      - student-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/authdb
      JWT_SECRET: votre_secret_jwt_super_securise_changez_moi_en_production
      JWT_EXPIRES_IN: 24h
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - student-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-nextjs
    ports:
      - "3000:3000"
    environment:
      API_GATEWAY_URL: http://api-gateway:8888
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8888
      NODE_ENV: production
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - student-network

networks:
  student-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
